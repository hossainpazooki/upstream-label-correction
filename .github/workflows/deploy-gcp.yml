name: Deploy to GCP

# Auto-trigger on CI completion disabled: workflow references deleted files
# (Dockerfile, Dockerfile.worker, Dockerfile.mcp) and GCP auth secrets are not
# yet configured. Re-add `workflow_run` once the workflow is rewritten for the
# infra-ts/ architecture and secrets are set.
on:
  workflow_dispatch:

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: us-central1
  REGISTRY: us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/precision-genomics

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and push web image
        run: |
          docker build -f web/Dockerfile \
            -t ${{ env.REGISTRY }}/web:${{ github.sha }} -t ${{ env.REGISTRY }}/web:latest \
            web/
          docker push ${{ env.REGISTRY }}/web:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/web:latest

      - name: Build and push ml-service image
        run: |
          docker build -f Dockerfile.ml \
            -t ${{ env.REGISTRY }}/ml-service:${{ github.sha }} -t ${{ env.REGISTRY }}/ml-service:latest \
            .
          docker push ${{ env.REGISTRY }}/ml-service:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/ml-service:latest

      - name: Build and push mcp-sse image
        run: |
          docker build -f web/Dockerfile.mcp \
            -t ${{ env.REGISTRY }}/mcp-sse:${{ github.sha }} -t ${{ env.REGISTRY }}/mcp-sse:latest \
            web/
          docker push ${{ env.REGISTRY }}/mcp-sse:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/mcp-sse:latest

      - name: Deploy web to Cloud Run
        run: |
          gcloud run deploy precision-genomics-web \
            --image ${{ env.REGISTRY }}/web:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --no-allow-unauthenticated \
            --set-env-vars "ENVIRONMENT=production,GCP_PROJECT_ID=${{ env.PROJECT_ID }},USE_SECRET_MANAGER=true,PERSIST_MODELS=true,REQUIRE_AUTH=true" \
            --set-secrets "ANTHROPIC_API_KEY=ANTHROPIC_API_KEY:latest,DATABASE_PASSWORD=DATABASE_PASSWORD:latest" \
            --vpc-connector precision-genomics-vpc \
            --min-instances 0 \
            --max-instances 10 \
            --memory 4Gi \
            --cpu 2

      - name: Deploy ml-service to Cloud Run
        run: |
          gcloud run deploy precision-genomics-ml-service \
            --image ${{ env.REGISTRY }}/ml-service:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --no-allow-unauthenticated \
            --set-env-vars "ENVIRONMENT=production,GCP_PROJECT_ID=${{ env.PROJECT_ID }},USE_SECRET_MANAGER=true" \
            --set-secrets "ANTHROPIC_API_KEY=ANTHROPIC_API_KEY:latest,DATABASE_PASSWORD=DATABASE_PASSWORD:latest" \
            --vpc-connector precision-genomics-vpc \
            --min-instances 0 \
            --max-instances 5 \
            --memory 8Gi \
            --cpu 4 \
            --timeout 900

      - name: Deploy MCP SSE to Cloud Run
        run: |
          gcloud run deploy precision-genomics-mcp-sse \
            --image ${{ env.REGISTRY }}/mcp-sse:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --set-env-vars "ENVIRONMENT=production,GCP_PROJECT_ID=${{ env.PROJECT_ID }},USE_SECRET_MANAGER=true" \
            --set-secrets "ANTHROPIC_API_KEY=ANTHROPIC_API_KEY:latest" \
            --vpc-connector precision-genomics-vpc \
            --min-instances 1 \
            --max-instances 5 \
            --memory 2Gi \
            --cpu 1 \
            --port 8080

      # GCP Workflows definitions removed — workflows now managed by
      # the Go intent-controller and Pulumi infrastructure.
