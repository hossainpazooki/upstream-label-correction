name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Lint
        run: ruff check core clue evals training dspy_modules ml_service scripts tests

      - name: Format check
        run: ruff format --check core clue evals training dspy_modules ml_service scripts tests

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_precision_genomics
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev,ml,gcp,dspy]"

      - name: Run tests
        run: pytest tests/ -x --tb=short --cov --cov-report=xml
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_precision_genomics
          ENVIRONMENT: test

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-report
          path: coverage.xml

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build ML service image
        run: docker build -f Dockerfile.ml -t precision-genomics-ml .

      - name: Build Web image
        run: docker build -f web/Dockerfile -t precision-genomics-web web/

      - name: Build MCP image
        run: docker build -f web/Dockerfile.mcp -t precision-genomics-mcp web/

      - name: Build Intent Controller image
        run: docker build -f intent-controller/Dockerfile -t precision-genomics-intent-controller intent-controller/

  go-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: intent-controller
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.22"
          cache-dependency-path: intent-controller/go.sum

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race ./...   # -race needs cgo; the ubuntu runner has gcc
