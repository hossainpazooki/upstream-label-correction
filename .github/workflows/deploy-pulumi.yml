name: Deploy via Pulumi

# Auto-trigger disabled until GCP OIDC secrets are configured in the repo.
# Re-add `workflow_run` trigger once GCP_WORKLOAD_IDENTITY_PROVIDER,
# GCP_SERVICE_ACCOUNT, and PULUMI_ACCESS_TOKEN secrets are set.
on:
  workflow_dispatch:
    inputs:
      stack:
        description: "Pulumi stack to deploy"
        required: true
        default: "prod"
        type: choice
        options:
          - dev
          - staging
          - prod

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: us-central1
  REGISTRY: us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/precision-genomics
  PULUMI_STACK: ${{ inputs.stack || 'prod' }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and push web image
        run: |
          docker build -f web/Dockerfile \
            -t ${{ env.REGISTRY }}/web:${{ github.sha }} \
            -t ${{ env.REGISTRY }}/web:latest \
            web/
          docker push ${{ env.REGISTRY }}/web:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/web:latest

      - name: Build and push ml-service image
        run: |
          docker build -f Dockerfile.ml \
            -t ${{ env.REGISTRY }}/ml-service:${{ github.sha }} \
            -t ${{ env.REGISTRY }}/ml-service:latest \
            .
          docker push ${{ env.REGISTRY }}/ml-service:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/ml-service:latest

      - name: Build and push mcp-sse image
        run: |
          docker build -f web/Dockerfile.mcp \
            -t ${{ env.REGISTRY }}/mcp-sse:${{ github.sha }} \
            -t ${{ env.REGISTRY }}/mcp-sse:latest \
            web/
          docker push ${{ env.REGISTRY }}/mcp-sse:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/mcp-sse:latest

    outputs:
      image-tag: ${{ github.sha }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: infra-ts/package-lock.json

      - name: Install Pulumi dependencies
        working-directory: infra-ts
        run: npm ci

      - name: Pulumi Up
        uses: pulumi/actions@v5
        with:
          command: up
          stack-name: precision-genomics/${{ env.PULUMI_STACK }}
          work-dir: infra-ts
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
          GOOGLE_PROJECT: ${{ secrets.GCP_PROJECT_ID }}

  preview:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: infra-ts/package-lock.json

      - name: Install Pulumi dependencies
        working-directory: infra-ts
        run: npm ci

      - name: Pulumi Preview
        uses: pulumi/actions@v5
        with:
          command: preview
          stack-name: precision-genomics/prod
          work-dir: infra-ts
          comment-on-pr: true
          comment-on-pr-number: ${{ github.event.pull_request.number }}
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
          GOOGLE_PROJECT: ${{ secrets.GCP_PROJECT_ID }}

      - name: CrossGuard Policy Check
        uses: pulumi/actions@v5
        with:
          command: preview
          stack-name: precision-genomics/prod
          work-dir: infra-ts
          policyPacks: infra-ts/policies
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
          GOOGLE_PROJECT: ${{ secrets.GCP_PROJECT_ID }}
