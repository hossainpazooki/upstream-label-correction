name: Security Scan

on:
  schedule:
    - cron: "0 6 * * 1" # Weekly on Monday at 06:00 UTC
  workflow_dispatch:

jobs:
  dependency-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev,ml,gcp,dspy]"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Run pip-audit
        # --strict dropped: the local editable dist (precision-genomics-agent-platform)
        # is not published to PyPI and cannot be audited; without --strict that is a
        # warning, while real dependency vulnerabilities still fail the job.
        #
        # --ignore-vuln CVE-2025-69872 (diskcache pickle-deserialization RCE):
        #   diskcache is a transitive dep of dspy-ai and has NO fixed release
        #   (latest is 5.6.3; upstream's last release predates the advisory, so
        #   there is nothing to upgrade to). The CVE requires an attacker to hold
        #   write access to the local cache directory, which on our controlled
        #   runtime already implies host code execution -- it adds no new exposure
        #   here. Revisit and drop this ignore the moment a patched diskcache (or a
        #   dspy-ai that pins a safe serializer) ships.
        run: pip-audit --desc --ignore-vuln CVE-2025-69872

  sast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Run SAST rules
        # SAST over the full source set; intentional findings are noqa'd with a reason.
        run: ruff check --select S core clue evals training dspy_modules ml_service scripts

  go-audit:
    # Vulnerability + SAST coverage for the Go intent-controller -- the
    # server-authoritative verification gate hardened in the 8-finding audit.
    # The Python jobs above never touched this module; this closes that gap.
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: intent-controller
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          # `stable` (not ci.yml's pinned 1.22) on purpose: govulncheck reports
          # stdlib vulnerabilities against the building toolchain, so an EOL 1.22
          # would flag a wall of already-patched stdlib CVEs. Build the scan with
          # the current stdlib and let it surface only genuinely-open issues.
          go-version: stable
          cache-dependency-path: intent-controller/go.sum

      - name: Install Go security tools
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          go install github.com/securego/gosec/v2/cmd/gosec@latest

      - name: Run govulncheck
        # Call-graph aware: fails only on vulnerabilities the controller actually
        # reaches, not every CVE in the dependency closure -- low false-positive.
        run: govulncheck ./...

      - name: Run gosec (Go SAST)
        # Gate on medium+ severity to mirror the Python ruff `--select S` job.
        # Intentional medium+ findings are annotated in-source with
        # `#nosec Gxxx -- reason`; LOW unhandled-error (G104) findings are
        # code-quality, tracked outside this security gate.
        run: gosec -severity medium ./...

  secret-detection:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
