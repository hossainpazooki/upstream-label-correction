name: Security Scan

on:
  schedule:
    - cron: "0 6 * * 1" # Weekly on Monday at 06:00 UTC
  workflow_dispatch:

jobs:
  dependency-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev,ml,gcp,dspy]"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Run pip-audit
        # --strict dropped: the local editable dist (precision-genomics-agent-platform)
        # is not published to PyPI and cannot be audited; without --strict that is a
        # warning, while real dependency vulnerabilities still fail the job.
        run: pip-audit --desc

  sast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Run SAST rules
        # SAST over the full source set; intentional findings are noqa'd with a reason.
        run: ruff check --select S core clue evals training dspy_modules ml_service scripts

  secret-detection:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
